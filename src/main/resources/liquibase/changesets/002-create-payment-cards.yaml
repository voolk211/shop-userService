databaseChangeLog:
  - changeSet:
      id: 002
      author: Vyacheslav
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: payment_cards
      changes:
        - createTable:
            tableName: payment_cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_card_user
                    references: users(id)
                    onDelete: CASCADE
                    onUpdate: RESTRICT
              - column:
                  name: number
                  type: VARCHAR(19)
                  constraints:
                    nullable: false
              - column:
                  name: holder
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValue: true
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_payment_cards_user_id
            tableName: payment_cards
            columns:
              - column:
                  name: user_id